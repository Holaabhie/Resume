# Deploy site to GitHub Pages (adjust build command and output path as needed)
# Triggers on pushes to main (or master) and manual dispatch.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Change this to your build command if different
        run: npm run build

      - name: Prepare Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          # Change this to the folder that contains your built static files:
          # e.g., ./build, ./dist, ./out, ./public
          path: ./build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1